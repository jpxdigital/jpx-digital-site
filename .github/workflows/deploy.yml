name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jpxdigital-site

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://jpxdigital.com.br
            NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to VM1
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM1_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd /srv/sites/jpxdigital

            # Login no GHCR com PAT (GITHUB_TOKEN não funciona fora do runner)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Gravar IMAGE_TAG no .env.deploy para o docker compose ler
            echo "IMAGE_TAG=$IMAGE_TAG" > .env.deploy

            # Pull + restart somente do container Next.js
            docker compose --env-file .env --env-file .env.deploy \
              up -d --no-deps --pull always nextjs

            # Aguardar container inicializar antes do health check
            sleep 10

            # Health check — aguarda até 90s (18x5s)
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
              if [ "$STATUS" = "200" ]; then
                echo "✓ Health check OK (HTTP $STATUS) — deploy concluído"
                break
              fi
              echo "Aguardando... ($i/18) — HTTP $STATUS"
              sleep 5
            done

            # Falha e rollback se ainda não saudável
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
            if [ "$STATUS" != "200" ]; then
              echo "✗ Deploy falhou (HTTP $STATUS) — revertendo para imagem anterior"
              sed -i 's/IMAGE_TAG=.*/IMAGE_TAG=latest/' .env.deploy
              docker compose --env-file .env --env-file .env.deploy \
                up -d --no-deps nextjs
              exit 1
            fi

            # Limpar imagens antigas (mantém as 3 mais recentes)
            docker image prune -f

        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy falhou para o commit ${{ github.sha }}"
          # Substituir por webhook n8n para notificação no WhatsApp/Slack
