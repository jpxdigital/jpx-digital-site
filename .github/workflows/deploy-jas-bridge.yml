name: Deploy JAS Bridge

on:
  push:
    branches: [main]
    paths:
      - 'deploy/jas-bridge/**'

jobs:
  deploy:
    name: Deploy to VM2 (jpx-n8n)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to VM2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_VM2_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "deploy/jas-bridge/jas-bridge.js,deploy/jas-bridge/package.json"
          target: "/home/ubuntu/jas-bridge"
          strip_components: 2

      - name: Restart jas-bridge
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM2_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd ~/jas-bridge
            docker compose restart jas-bridge

            # Aguardar container inicializar
            sleep 5

            # Health check — aguarda processo HTTP subir (200=conectado, 503=reconectando WA)
            for i in $(seq 1 6); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
                echo "✓ jas-bridge respondendo (HTTP $STATUS)"
                exit 0
              fi
              echo "Aguardando... ($i/6) — HTTP $STATUS"
              sleep 5
            done

            echo "✗ jas-bridge não respondeu após restart"
            docker logs jas-bridge --tail=20
            exit 1
