upstream n8n {
    server n8n:5678;
    keepalive 32;
}

server {
    listen 80;
    server_name n8n.jpxdigital.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name n8n.jpxdigital.com.br;

    ssl_certificate     /etc/letsencrypt/live/n8n.jpxdigital.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.jpxdigital.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # n8n requer suporte a WebSocket
    location / {
        proxy_pass http://n8n;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para workflows de longa duração
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        proxy_cache_bypass 1;
        add_header Cache-Control "no-store";
    }

    access_log /var/log/nginx/n8n.access.log combined;
    error_log  /var/log/nginx/n8n.error.log warn;
}
