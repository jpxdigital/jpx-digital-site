global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          instance: vm1

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: vm1

  - job_name: nginx
    static_configs:
      - targets: ['nginx_exporter:9113']
        labels:
          instance: vm1

  - job_name: nextjs
    static_configs:
      - targets: ['nextjs:3000']
        metrics_path: /api/metrics
        labels:
          instance: vm1
