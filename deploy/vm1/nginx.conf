upstream nextjs {
    server nextjs:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name jpxdigital.com.br www.jpxdigital.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jpxdigital.com.br www.jpxdigital.com.br;

    # TLS — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/jpxdigital.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jpxdigital.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (Cloudflare already adds most, belt+suspenders)
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Static assets — immutable cache (Next.js fingerprints filenames)
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API — no cache, rate-limit enforced in Next.js
    location /api/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
    }

    # All other routes
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSG pages: short cache (Cloudflare CDN handles the heavy lifting)
        proxy_cache_valid 200 5m;
    }

    # Health check endpoint (used by CI/CD and monitoring)
    location /health {
        access_log off;
        proxy_pass http://nextjs/api/health;
    }

    # Logs
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;
}
