services:
  nginx:
    image: nginx:1.27-alpine
    container_name: jpx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - nextjs
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m

  nextjs:
    image: ghcr.io/jpxdigital/jpxdigital-site:${IMAGE_TAG:-latest}
    container_name: jpx_nextjs
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HUBSPOT_TOKEN: ${HUBSPOT_TOKEN}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_INTERNAL_SECRET: ${N8N_INTERNAL_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
    expose:
      - "3000"
    networks:
      - frontend
    # Sem Redis na VM1: rate limiting usa Map em memória (suficiente para fase 1)
    # Redis pode ser adicionado quando migrar para A1 Flex
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  nginx_logs:

networks:
  frontend:
