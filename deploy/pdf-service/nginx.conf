server {
    listen 80;
    server_name pdf.jpxdigital.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pdf.jpxdigital.com.br;

    ssl_certificate     /etc/letsencrypt/live/pdf.jpxdigital.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdf.jpxdigital.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Apenas n8n pode chamar o serviço (IP do jpx-n8n)
    allow 137.131.205.54;
    # Ashburn VMs (para testes internos)
    allow 129.80.120.133;
    allow 141.148.50.123;
    deny all;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 4m;
    }
}
